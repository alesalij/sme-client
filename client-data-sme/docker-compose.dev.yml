version: '3.8'

services:
  client-data-sme-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: client-data-sme-dev
    ports:
      - "5173:5173"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./index.html:/app/index.html
      - ./vite.config.ts:/app/vite.config.ts
      - ./tsconfig.json:/app/tsconfig.json
      - /app/node_modules
    environment:
      - NODE_ENV=development
    restart: unless-stopped
    stdin_open: true
    tty: true
    networks:
      - client-data-network

networks:
  client-data-network:
    driver: bridge